name: CI

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

# Opt in to Node 24 for the actions runtime (checkout/setup-node v4 default to
# Node 20, which is being removed from runners). Remove once v5 actions ship.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  test:
    name: Node ${{ matrix.node }} / ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22, 24]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
      - run: npm ci
      - name: Build
        run: npm run build
      - name: Tests (legacy + modern decorator modes)
        run: npm test
      - name: Pre-publish smoke test (built dist bundle)
        run: npm run test:dist
